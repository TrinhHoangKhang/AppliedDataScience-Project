# Overwritting configs
metadata: sentence    # TIGER requires sentence metadata
train_batch_size: 256
eval_batch_size: 256
lr: 3e-3
weight_decay: 0.05

# Config for sentence embedding model
sent_emb_model: sentence-transformers/sentence-t5-base
sent_emb_batch_size: 512
sent_emb_dim: 768
sent_emb_pca: -1     # No PCA for atomic IDs

# Config for RQ - Using atomic tokenization (naive mode)
rq_faiss: False      # Not needed for atomic IDs
faiss_omp_num_threads: 32
rq_n_codebooks: 1    # Atomic tokenization
rq_codebook_size: -1 # -1 means use item_id directly (n_items)

# Config for TIGER with SASRec architecture size
n_user_tokens: 1      # Number of user tokens hashed from user ids
max_item_seq_len: 50  # Same as original SASRec config
num_beams: 50         # Number of beams for beam search

# Config for T5 - matching SASRec architecture size
num_layers: 2         # Same as SASRec n_layer
num_decoder_layers: 2 # Same as encoder
d_model: 64           # Same as SASRec n_embd
d_ff: 256             # Same as SASRec n_inner
num_heads: 2          # Same as SASRec n_head
dropout_rate: 0.5     # Using SASRec's dropout values
activation_function: "gelu_new"  # Same as SASRec
